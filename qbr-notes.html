<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SyncDash — QBR Prep Notes</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #f8fafc;
      --surface:  #ffffff;
      --border:   #e2e8f0;
      --border2:  #cbd5e1;
      --text:     #1e293b;
      --muted:    #64748b;
      --faint:    #94a3b8;
      --teal:     #0d9488;
      --teal-bg:  rgba(13,148,136,0.07);
      --green:    #16a34a;
      --green-bg: rgba(22,163,74,0.08);
      --amber:    #d97706;
      --amber-bg: rgba(217,119,6,0.08);
      --red:      #dc2626;
      --red-bg:   rgba(220,38,38,0.08);
      --sage:     #7c3aed;
      --sage-bg:  rgba(124,58,237,0.07);
      --sage-border: rgba(124,58,237,0.2);
      --radius:   8px;
      --radius-sm: 5px;
      --max-w:    820px;
    }

    html, body { min-height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; line-height: 1.6; }

    /* ── TOPBAR ── */
    .topbar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 32px; height: 52px; gap: 16px;
      position: sticky; top: 0; z-index: 100;
    }
    .topbar-logo { font-family: 'Outfit', sans-serif; font-weight: 300; font-size: 16px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text); text-decoration: none; }
    .topbar-logo span { color: var(--teal); }
    .topbar-label {
      flex: 1;
      font-size: 11px; font-family: 'DM Mono', monospace;
      text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted);
    }
    .topbar-actions { display: flex; gap: 8px; }

    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: var(--radius-sm);
      font-size: 12.5px; font-weight: 500; cursor: pointer;
      border: 1px solid var(--border); text-decoration: none;
      transition: all 0.15s; font-family: 'DM Sans', sans-serif;
      background: var(--surface); color: var(--muted);
    }
    .btn:hover { color: var(--text); border-color: var(--border2); }
    .btn-primary { background: var(--teal); border-color: var(--teal); color: #fff; }
    .btn-primary:hover { background: #0f766e; border-color: #0f766e; color: #fff; }

    /* ── HEADER ── */
    .doc-header {
      max-width: var(--max-w); margin: 32px auto 0; padding: 0 24px;
    }

    .doc-title-row {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 16px; margin-bottom: 16px;
    }

    .doc-account {
      font-family: 'Outfit', sans-serif; font-size: 28px; font-weight: 800;
      color: var(--text); letter-spacing: -0.02em; line-height: 1.1;
    }

    .doc-confidential {
      font-size: 10px; font-family: 'DM Mono', monospace;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: #fff; background: var(--red); padding: 3px 8px;
      border-radius: 3px; white-space: nowrap; margin-top: 6px;
    }

    .doc-meta-strip {
      display: flex; align-items: center; gap: 20px;
      padding: 12px 16px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); font-size: 12px; color: var(--muted);
      font-family: 'DM Mono', monospace; flex-wrap: wrap;
    }

    .doc-meta-item strong { color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 600; }

    .doc-divider { height: 1px; background: var(--border); margin: 24px 0; }

    /* ── SECTIONS ── */
    .sections { max-width: var(--max-w); margin: 0 auto; padding: 0 24px 80px; }

    .section {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); margin-bottom: 20px; overflow: hidden;
    }

    .section-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
      background: var(--bg);
    }

    .section-title {
      font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 700;
      color: var(--text);
    }

    .section-status {
      font-size: 11px; font-family: 'DM Mono', monospace;
      padding: 2px 8px; border-radius: 10px; white-space: nowrap;
      border: 1px solid transparent;
    }
    .section-status.green { background: var(--green-bg); color: var(--green); border-color: rgba(22,163,74,0.2); }
    .section-status.amber { background: var(--amber-bg); color: var(--amber); border-color: rgba(217,119,6,0.2); }
    .section-status.red   { background: var(--red-bg);   color: var(--red);   border-color: rgba(220,38,38,0.2); }
    .section-status.muted { background: #f1f5f9; color: var(--muted); border-color: var(--border); }

    .section-body { padding: 18px 20px; display: flex; flex-direction: column; gap: 16px; }

    /* ── SAGE CONTEXT ── */
    .sage-context {
      background: var(--sage-bg); border: 1px solid var(--sage-border);
      border-radius: var(--radius-sm); padding: 14px 16px;
    }

    .sage-context-label {
      font-size: 9.5px; font-family: 'DM Mono', monospace;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--sage); margin-bottom: 6px;
      display: flex; align-items: center; gap: 5px;
    }

    .sage-context-label::before { content: '✦'; font-size: 10px; }

    .sage-context-text { font-size: 12.5px; color: var(--text); line-height: 1.65; }

    /* ── PROMPTS ── */
    .prompts-section { display: flex; flex-direction: column; gap: 6px; }

    .prompts-label {
      font-size: 9.5px; font-family: 'DM Mono', monospace;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--muted); margin-bottom: 2px;
    }

    .prompt-row {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 10px 12px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: var(--bg);
      font-size: 12.5px; color: var(--muted); line-height: 1.5;
    }

    .prompt-row.selected {
      background: var(--sage-bg); border-color: var(--sage-border);
      color: var(--text);
    }

    .prompt-check {
      width: 16px; height: 16px; border-radius: 50%;
      border: 1.5px solid var(--border); flex-shrink: 0; margin-top: 2px;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px;
    }

    .prompt-row.selected .prompt-check {
      background: var(--sage); border-color: var(--sage); color: #fff;
    }

    /* ── NOTES AREA ── */
    .notes-area { display: flex; flex-direction: column; gap: 6px; }

    .notes-label {
      font-size: 9.5px; font-family: 'DM Mono', monospace;
      text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted);
    }

    .notes-textarea {
      width: 100%; min-height: 88px;
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 10px 12px; font-size: 13px; color: var(--text);
      font-family: 'DM Sans', sans-serif; line-height: 1.6;
      background: var(--surface); resize: vertical;
      transition: border-color 0.15s;
    }

    .notes-textarea:focus { outline: none; border-color: var(--teal); }
    .notes-textarea::placeholder { color: var(--faint); }

    /* ── PRINT ── */
    @media print {
      .topbar { display: none; }
      body { background: #fff; }
      .doc-header { padding: 0; margin-top: 16px; }
      .sections { padding: 0 0 40px; }
      .section { break-inside: avoid; page-break-inside: avoid; }
      .notes-textarea { border: none; border-bottom: 1px solid var(--border); border-radius: 0; resize: none; min-height: 60px; background: transparent; }
      .btn { display: none; }
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  </style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <a class="topbar-logo" id="back-link" href="dashboard.html">Sync<span>Dash</span></a>
  <div class="topbar-label" id="topbar-label">Internal Prep Notes</div>
  <div class="topbar-actions">
    <button class="btn" onclick="window.print()">⎙ Print</button>
    <a class="btn btn-primary" id="back-deck" href="#">← Back to Deck</a>
  </div>
</div>

<!-- DOC HEADER -->
<div class="doc-header">
  <div class="doc-title-row">
    <div>
      <div class="doc-account" id="doc-account">—</div>
      <div style="font-size:13px;color:var(--muted);margin-top:4px;" id="doc-subtitle">Quarterly Business Review — Internal Prep</div>
    </div>
    <div class="doc-confidential">Internal Only — Not for Distribution</div>
  </div>
  <div class="doc-meta-strip" id="doc-meta"></div>
  <div class="doc-divider"></div>
</div>

<!-- SECTIONS -->
<div class="sections" id="sections-container"></div>

<script src="accounts.js"></script>
<script>
  if (!localStorage.getItem('syncdash_user')) {
    window.location.replace('login.html');
  }

  const params     = new URLSearchParams(window.location.search);
  const id         = params.get('account');
  const type       = params.get('type') || 'internal';
  const isClient   = type === 'client';
  const account    = id ? SyncDash.getAccount(id) : null;

  // Read selections from URL param (passed by generateNotes) with sessionStorage fallback
  let selections = {};
  try {
    const selParam = params.get('sel');
    if (selParam) {
      selections = JSON.parse(decodeURIComponent(selParam));
    } else {
      selections = JSON.parse(sessionStorage.getItem('syncdash_qbr_selections') || '{}');
    }
  } catch(e) {
    selections = {};
  }

  const qbrData = account ? (isClient ? account.qbrClient : account.qbr) : null;

  if (!account || !qbrData) {
    document.body.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;color:#64748b;font-family:'DM Sans',sans-serif;"><div style="font-size:32px;">◈</div><div style="font-size:16px;color:#1e293b;">Notes not found</div><div style="font-size:13px;">No ${isClient ? 'client' : 'internal'} QBR data for "${id || 'unknown'}".</div><a href="dashboard.html" style="margin-top:8px;color:#0d9488;font-size:13px;text-decoration:none;">← Back to dashboard</a></div>`;
  } else {
    renderNotes(account, qbrData, isClient);
  }

  function tierClass(t) { return t === 'green' ? 'green' : t === 'red' ? 'red' : 'amber'; }

  function formatRenewal(months) {
    if (months < 2)  return `${Math.round(months * 4)} weeks`;
    if (months < 12) return `${Math.round(months)} months`;
    return `${(months / 12).toFixed(1)} years`;
  }

  function sectionStatus(key, a, isClient) {
    const tc = tierClass(a.healthTier);
    const rc = tierClass(a.renewalTier);
    if (isClient) {
      switch(key) {
        case 'highlights':   return { label: `${a.qbrClient.highlights.length} highlights`, cls: 'green' };
        case 'focus':        return { label: `${a.qbrClient.focus.length} focus areas`, cls: 'muted' };
        case 'commitments':  return { label: `${a.qbrClient.commitments.length} commitments`, cls: 'muted' };
        case 'renewal':      return { label: `${formatRenewal(a.renewalMonths)} remaining`, cls: rc };
        default:             return { label: '', cls: 'muted' };
      }
    }
    switch(key) {
      case 'health':    return { label: `${a.healthScore}/100 — ${a.healthTier === 'green' ? 'Healthy' : a.healthTier === 'red' ? 'Critical' : 'At Risk'}`, cls: tc };
      case 'adoption':  return { label: `${a.adoptionPct}% overall adoption`, cls: tierClass(a.adoptionPct >= 70 ? 'green' : a.adoptionPct >= 40 ? 'amber' : 'red') };
      case 'risks': {
        const critCount = (a.riskFlags || []).filter(f => f.type === 'crit').length;
        const warnCount = (a.riskFlags || []).filter(f => f.type === 'warn').length;
        if (critCount) return { label: `${critCount} critical flag${critCount > 1 ? 's' : ''}`, cls: 'red' };
        if (warnCount) return { label: `${warnCount} warning${warnCount > 1 ? 's' : ''}`, cls: 'amber' };
        return { label: 'No active flags', cls: 'green' };
      }
      case 'renewal':   return { label: `${formatRenewal(a.renewalMonths)} remaining`, cls: rc };
      case 'nextSteps': return { label: `${a.qbr.goals.length} action items`, cls: 'muted' };
      default:          return { label: '', cls: 'muted' };
    }
  }

  function renderNotes(a, q, isClient) {
    const today = new Date().toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
    const deckFile = isClient ? `qbr-client.html?account=${a.id}` : `qbr-preview.html?account=${a.id}`;
    const typeLabel = isClient ? 'Client Meeting Prep' : 'Internal Prep';
    const confidentialLabel = isClient ? 'Your Eyes Only — Not for Distribution' : 'Internal Only — Not for Distribution';

    document.title = `${a.name} — QBR ${typeLabel} Notes`;
    document.getElementById('doc-account').textContent = a.name;
    document.getElementById('doc-subtitle').textContent = `${q.quarter} · Quarterly Business Review — ${typeLabel}`;
    document.getElementById('topbar-label').textContent = `${a.name} · ${q.quarter} · ${typeLabel} Notes`;
    document.getElementById('back-deck').href = deckFile;
    document.getElementById('back-link').href = deckFile;
    document.querySelector('.doc-confidential').textContent = confidentialLabel;

    document.getElementById('doc-meta').innerHTML = `
      <div class="doc-meta-item">Quarter <strong>${q.quarter}</strong></div>
      <div class="doc-meta-item">Account <strong>${a.name}</strong></div>
      <div class="doc-meta-item">Industry <strong>${a.industry}</strong></div>
      <div class="doc-meta-item">Prepared by <strong>${q.preparedBy}</strong></div>
      <div class="doc-meta-item">Date <strong>${today}</strong></div>
      <div class="doc-meta-item">ARR <strong>$${a.arr.toLocaleString()}</strong></div>
    `;

    const internalSections = [
      { key: 'health',    title: 'Account Health',     prepKey: 'health',    promptKey: 'health',    placeholder: 'Team discussion notes — are we aligned on the score? Who owns what before the client call?' },
      { key: 'adoption',  title: 'Adoption & Usage',   prepKey: 'adoption',  promptKey: 'adoption',  placeholder: 'Which departments came up? Any internal context about why certain teams are lagging or leading?' },
      { key: 'risks',     title: 'Risks & Open Items', prepKey: 'risks',     promptKey: 'risks',     placeholder: 'Ownership decisions — who is accountable for each risk item and what is the resolution plan?' },
      { key: 'renewal',   title: 'Renewal & Contract', prepKey: 'renewal',   promptKey: 'renewal',   placeholder: 'Internal renewal stance — what are we hoping for? Any pricing or flexibility approved internally?' },
      { key: 'nextSteps', title: 'Next Steps',         prepKey: 'nextSteps', promptKey: 'nextSteps', placeholder: 'Final alignment — what commitments are we walking into the client call ready to make?' },
    ];

    const clientSections = [
      { key: 'highlights',  title: 'What\'s Going Well',              prepKey: 'highlights',  promptKey: 'highlights',  placeholder: 'Notes from the highlights discussion — what resonated? What did they push back on?' },
      { key: 'focus',       title: 'What We\'re Focused On Together', prepKey: 'focus',       promptKey: 'focus',       placeholder: 'How did they respond to the focus areas? Anything to follow up on?' },
      { key: 'commitments', title: 'Our Commitments',                 prepKey: 'commitments', promptKey: 'commitments', placeholder: 'Did they add any commitments on their side? Any adjustments to what we offered?' },
      { key: 'renewal',     title: 'Looking Ahead',                   prepKey: 'renewal',     promptKey: 'renewal',     placeholder: 'How did they respond to the renewal framing? Any signals about their intent?' },
    ];

    const sections = isClient ? clientSections : internalSections;
    const container = document.getElementById('sections-container');

    sections.forEach(sec => {
      const status  = sectionStatus(sec.key, a, isClient);
      const context = q.sagePrep[sec.prepKey];
      const prompts = q.prompts?.[sec.promptKey] || [];
      const sel     = selections[sec.promptKey] || [];
      const selectedPrompts = prompts.filter((p, i) => sel.includes(i));

      const div = document.createElement('div');
      div.className = 'section';

      div.innerHTML = `
        <div class="section-header">
          <div class="section-title">${sec.title}</div>
          ${status.label ? `<span class="section-status ${status.cls}">${status.label}</span>` : ''}
        </div>
        <div class="section-body">
          <div class="sage-context">
            <div class="sage-context-label">Sage — ${isClient ? 'How to present this' : 'Internal prep'}</div>
            <div class="sage-context-text">${context}</div>
          </div>
          ${selectedPrompts.length ? `
          <div class="prompts-section">
            <div class="prompts-label">Selected ${isClient ? 'Discussion' : 'Team'} Prompts</div>
            ${selectedPrompts.map(p => `
              <div class="prompt-row selected">
                <div class="prompt-check">✓</div>
                <span>${p}</span>
              </div>`).join('')}
          </div>` : ''}
          <div class="notes-area">
            <div class="notes-label">${isClient ? 'Client Meeting Notes' : 'Internal Notes / Team Feedback'}</div>
            <textarea class="notes-textarea" placeholder="${sec.placeholder}" data-section="${sec.key}"></textarea>
          </div>
        </div>
      `;

      container.appendChild(div);
    });

    // Restore saved notes
    const savedNotes = JSON.parse(sessionStorage.getItem(`syncdash_qbr_notes_${type}`) || '{}');
    document.querySelectorAll('.notes-textarea').forEach(ta => {
      const key = ta.dataset.section;
      if (savedNotes[key]) ta.value = savedNotes[key];
      ta.addEventListener('input', () => {
        savedNotes[key] = ta.value;
        sessionStorage.setItem(`syncdash_qbr_notes_${type}`, JSON.stringify(savedNotes));
      });
    });
  }
</script>
</body>
</html>
